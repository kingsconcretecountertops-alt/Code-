<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Kings Concrete Countertops</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var form = document.getElementById('contact-form');
      var success = document.getElementById('form-success');
      var error = document.getElementById('form-error');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var data = new FormData(form);
        fetch(form.action, {
          method: "POST",
          body: data,
          headers: { 'Accept': 'application/json' }
        }).then(response => {
          if (response.ok) {
            success.style.display = 'block';
            error.style.display = 'none';
            form.reset();
          } else {
            response.json().then(data => {
              if (Object.hasOwn(data, 'errors')) {
                error.textContent = data.errors.map(e => e.message).join(', ');
              } else {
                error.textContent = "There was a problem sending your message.";
              }
              error.style.display = 'block';
              success.style.display = 'none';
            });
          }
        }).catch(() => {
          error.textContent = "There was a problem sending your message.";
          error.style.display = 'block';
          success.style.display = 'none';
        });
      });
    });
  </script>
</head>
<body>
  <header>
    <nav>
      <ul class="nav-left">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="gallery.html">Gallery</a></li>
      </ul>
      <ul class="nav-right">
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section>
      <h2>Contact Us</h2>
      <form id="contact-form" action="https://formspree.io/f/mvzvjjyg" method="POST">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input id="name" name="name" type="text" required>
        </div>
        <div class="form-group">
          <label for="email">Your Email</label>
          <input id="email" name="email" type="email" required>
        </div>
        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit">Send Message</button>
        <div id="form-success" class="success">Thank you for reaching out! We'll get back to you soon.</div>
        <div id="form-error" class="error"></div>
      </form>
    </section>
  </main>
  <footer>
    <p>&copy; 2026 Kings Concrete Countertops. All Rights Reserved.</p>
  </footer>
</body>
</html>
